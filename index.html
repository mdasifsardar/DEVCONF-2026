<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>DEVCONF 2026</title>
    <link rel="stylesheet" href="style.css" />

    <!-- Google fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <!-- Header area start -->
    <header class="header-parent container">
      <nav>
        <div class="header-logo">
          <img src="img/logo.png" alt="headerLogo" />
        </div>

        <div class="nav-item">
          <ul>
            <li><a href="#">Speakers</a></li>
            <li><a href="#">Schedule</a></li>
            <li><a href="#">Tracks</a></li>
            <li><a href="#">Venue</a></li>
            <li><a href="#">Blog</a></li>
          </ul>
        </div>

        <div><button class="common-btn">Register Now</button></div>
      </nav>
    </header>
    <!-- Header area end -->

    <!-- Meet the speakers section start -->
    <section class="meet-the-speakers-parent container">
      <h2 class="meet-the-speakers-heading">Meet the Speakers</h2>

      <div class="speakers-image-parent">
        <div class="speakers-image">
          <img src="img/andrej.png" alt="andrej" />
          <div class="speakers-text">
            <p class="image-p-1">AI / ML</p>
            <h2>Andrej Karpathy</h2>
            <p class="image-p-2">Pretraining team, Anthropic</p>
          </div>
        </div>

        <div class="speakers-image">
          <img src="img/demis.png" alt="andrej" />
          <div class="speakers-text">
            <p class="image-p-1">Cloud & DevOps</p>
            <h2>Demis Hassabis</h2>
            <p class="image-p-2">Co-Founder and CEO, Google DeepMind</p>
          </div>
        </div>

        <div class="speakers-image">
          <img src="img/gary.png" alt="andrej" />
          <div class="speakers-text">
            <p class="image-p-1">Frontend</p>
            <h2>Gary Marcus</h2>
            <p class="image-p-2">Staff Engineer, Vercel</p>
          </div>
        </div>

        <div class="speakers-image">
          <img src="img/mustafa.png" alt="andrej" />
          <div class="speakers-text">
            <p class="image-p-1">Security</p>
            <h2>Mustafa Suleyman</h2>
            <p class="image-p-2">CEO of Microsoft AI</p>
          </div>
        </div>
      </div>
    </section>
    <!-- Meet the speakers section end -->
  </body>
</html>
